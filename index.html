<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBR Bank</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container mt-5">

        <h2 class="text-center mb-4">UBR Bank</h2>

        <div id="auth">

            <input type="email" id="email" class="form-control mb-3" placeholder="Enter Email">

            <input type="password" id="password" class="form-control mb-3" placeholder="Enter Password">

            <button class="btn btn-success w-100 mb-2" onclick="signup()">
                Sign Up
            </button>

            <button class="btn btn-primary w-100 mb-2" onclick="login()">
                Login
            </button>

            <button class="btn btn-danger w-100" onclick="exitApp()">
                Exit
            </button>

        </div>


        <div id="dashboard" style="display:none;">

            <h3 class="mb-4">Welcome To UBR Bank</h3>

            <input type="number" id="amount" class="form-control mb-3" placeholder="Enter Amount">

            <button class="btn btn-warning w-100 mb-2" onclick="withdraw()">
                Withdraw
            </button>

            <button class="btn btn-success w-100 mb-2" onclick="deposit()">
                Deposit
            </button>

            <button class="btn btn-info w-100 mb-2" onclick="checkBalance()">
                Check Balance
            </button>

            <input type="email" id="receiver" class="form-control mb-3" placeholder="Receiver Email">

            <button class="btn btn-secondary w-100 mb-2" onclick="transferMoney()">
                Transfer Money
            </button>

            <button class="btn btn-dark w-100 mb-2" onclick="bankStatement()">
                Bank Statement
            </button>

            <div id="statementBox" class="mt-3" style="display:none;">
                <h5 class="text-white mb-3">Transaction History</h5>
                <ul id="statementList" class="list-group"></ul>
            </div>
            
            <button class="btn btn-danger w-100" onclick="logout()">
                Logout
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
